net:
  port: 27017
  bindIpAll: true
  unixDomainSocket:
    enabled: true
    pathPrefix: /var/run/mongodb

replication:
  replSetName: "rs0"

setParameter:
  mongotHost: localhost:27028
  searchIndexManagementHostAndPort: localhost:27028
  skipAuthenticationToSearchIndexManagementServer: true
  useGrpcForSearch: true

storage:
  dbPath: /data/db
