syncSource:
  replicaSet:
    hostAndPort: "localhost:27017"
    scramAuth:
      username: mongotUser
      authSource: admin
      passwordFile: /mongot-community/pwfile
      tls:
        enabled: false
storage:
  dataPath: "/data/mongot"

server:
  grpc:
    address: "localhost:27028"
    tls:
      mode: "disabled"

metrics:
  enabled: true
  address: "localhost:9946"

healthCheck:
  address: "localhost:8080"

logging:
  verbosity: INFO
