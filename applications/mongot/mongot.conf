syncSource:
  replicaSet:
    hostAndPort: "localhost:27017"
    username: mongotUser
    passwordFile: /mongot-community/pwfile
    authSource: admin
    tls: false
    readPreference: primaryPreferred

storage:
  dataPath: "/data/mongot"

server:
  grpc:
    address: "localhost:27028"
    tls:
      mode: "disabled"

metrics:
  enabled: true
  address: "localhost:9946"

healthCheck:
  address: "localhost:8080"

logging:
  verbosity: INFO
